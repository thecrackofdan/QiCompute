name: full validation

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  full-validation:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Full test suite
        run: python -m unittest -v
      - name: Accounting summary
        run: python accounting_checks.py --quick > accounting-summary.txt
      - name: Load sanity
        run: python load_test.py --workers 3 --jobs 10 > load-summary.txt
      - name: Bottleneck summary
        run: python bottleneck_report.py --workers 3 --jobs 10 > bottleneck-summary.txt
      - name: Reliability summary
        run: python reliability_report.py > reliability-summary.txt
      - name: Upload aggregate reports
        uses: actions/upload-artifact@v4
        with:
          name: qicompute-validation-${{ matrix.python-version }}
          path: |
            accounting-summary.txt
            load-summary.txt
            bottleneck-summary.txt
            reliability-summary.txt
