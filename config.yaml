# Crossover daemon configuration. All money values are decimal strings,
# converted once to integer micro-USD/micro-Qi; no float math on money.

daemon:
  db_path: "crossover.db"
  decision_interval_seconds: 60

power:
  usd_per_kwh: "0.12"        # your electricity price
  fallback_watts: 300        # used when nvidia-smi is unavailable

gpu:
  nvidia_smi_path: "nvidia-smi"

mining:
  # The daemon starts/stops your existing Quai miner binary. Example:
  # miner_command: ["./quai-gpu-miner", "-P", "stratum://wallet@pool:3333"]
  miner_command: []
  # Measured with benchmark.py; RTX 3090 ProgPoW is typically ~45 MH/s.
  fallback_hashrate_hps: 45000000
  # Regex applied to miner stdout by benchmark.py to read live hashrate.
  hashrate_regex: "([0-9]+(?:\\.[0-9]+)?)\\s*[Mm][Hh]/s"
  hashrate_unit_multiplier: 1000000
  block_reward_qi: "3"       # verify against current Quai emission
  price_feed:
    type: "get"
    url: "https://api.coingecko.com/api/v3/simple/price?ids=quai-network&vs_currencies=usd"
    json_path: "quai-network.usd"
  difficulty_feed:
    type: "jsonrpc"
    url: "https://rpc.quai.network/cyprus1"
    method: "quai_getBlockByNumber"
    params: ["latest", false]
    # Verify this path against your node/explorer output; on any feed error
    # the daemon defaults to mining.
    json_path: "result.woHeader.difficulty"

inference:
  # Empty if Ollama already runs as a service; otherwise e.g. ["ollama", "serve"]
  backend_command: []
  ollama_url: "http://127.0.0.1:11434"
  model: "llama3.1:8b"
  probe_interval_seconds: 300
  probe_prompt: "Briefly explain what a hash function does."
  # Fraction of the day you expect to actually sell at the market rate.
  utilization_percent: 50
  # Optional live $/hr feed (point at a Vast.ai/RunPod proxy returning JSON).
  market_rate_feed:
    type: "get"
    url: ""
    json_path: ""
  # Used when the market rate feed is empty or failing (Vast.ai RTX 3090
  # listings commonly sit around this; adjust to current listings).
  fallback_usd_per_hour: "0.20"

switching:
  margin_percent: 15           # challenger must beat incumbent by this much
  consecutive_decisions: 3     # ...for this many evaluations in a row
  min_dwell_seconds: 1800      # ...and no switch within 30 min of the last
  margin_floor_usd_per_day: "0.05"
