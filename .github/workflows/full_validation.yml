name: full validation

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  full-validation:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Root test suites
        run: python -m unittest -v
      - name: Sample pipeline
        run: python reproduce.py --sample
      - name: Crossover daemon tool suite
        run: cd tools/crossover-daemon && python -m unittest
      - name: Legacy full suite
        run: cd legacy && python -m unittest -v
      - name: Legacy accounting summary
        run: cd legacy && python accounting_checks.py --quick > ../accounting-summary.txt
      - name: Legacy load sanity
        run: cd legacy && python load_test.py --workers 3 --jobs 10 > ../load-summary.txt
      - name: Upload aggregate reports
        uses: actions/upload-artifact@v4
        with:
          name: qicompute-validation-${{ matrix.python-version }}
          path: |
            accounting-summary.txt
            load-summary.txt
