# Configuration for the empirical claims. All data is fetched into data/ and
# cached; analysis always runs from the cache so results are reproducible.

data_dir: "data"
results_dir: "results"

prices:
  # Proposed source: CoinGecko - free, no API key, aggregates exchanges, and
  # carries QUAI's full daily history since listing (early 2024), which is the
  # longest continuous public series available. Swap URLs to change source.
  qi_url: "https://api.coingecko.com/api/v3/coins/quai-network/market_chart?vs_currency=usd&days=max&interval=daily"
  btc_url: "https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=max&interval=daily"
  # Second crypto-beta null: small-caps often track broad risk appetite more
  # tightly than BTC alone; the thesis must beat every null.
  eth_url: "https://api.coingecko.com/api/v3/coins/ethereum/market_chart?vs_currency=usd&days=max&interval=daily"
  # CoinGecko market_chart returns {"prices": [[ms_epoch, usd], ...],
  # "total_volumes": [[ms_epoch, usd], ...]} - volumes are cached for the
  # liquidity honesty section (OBJECTIONS.md item d).
  json_path: "prices"
  volume_json_path: "total_volumes"

difficulty:
  # CONFIRMED SOURCE PLAN: explorer endpoint for deep history when one is
  # available, automatic fallback to RPC header sampling on any explorer
  # error ("both"). Set explorer_url + explorer_json_path to a charts
  # endpoint returning [ms_epoch_or_date, difficulty] pairs; until then,
  # "both" effectively means rpc_scan. Verify the rpc field paths below
  # against one real quai_getBlockByNumber response.
  mode: "both"
  explorer_url: ""
  explorer_json_path: ""
  rpc_url: "https://rpc.quai.network/cyprus1"
  rpc_block_step: 3000          # sample one block in every N
  rpc_difficulty_path: "result.woHeader.difficulty"
  rpc_timestamp_path: "result.woHeader.timestamp"

electricity:
  # EIA v2 API (https://www.eia.gov/opendata/) - requires a free API key.
  # Without a key, claim 2 uses the flat fallback and labels it as such.
  eia_api_key: ""
  eia_url_template: "https://api.eia.gov/v2/electricity/retail-sales/data/?api_key={key}&frequency=monthly&data[0]=price&facets[sectorid][]=IND&facets[stateid][]=US&sort[0][column]=period&sort[0][direction]=asc"
  fallback_usd_per_kwh: "0.12"

reference_gpu:
  # The modeled cost-of-production rig. RTX 3090 on ProgPoW.
  name: "RTX 3090"
  hashrate_hps: 45000000
  watts: 300

network:
  block_reward_qi: "3"          # verify against current Quai emission schedule
  usd_per_kwh: "0.12"           # production electricity price for the cost model

benchmark:
  # Claim 3 measurement (benchmark.py). The boundary is marginal GPU board
  # draw via nvidia-smi - see the benchmark.py docstring before comparing
  # numbers across rigs.
  nvidia_smi_path: "nvidia-smi"
  fallback_watts: 300

  # --- Inference backend ---
  # Two supported backends:
  #   "ollama"       : vanilla Ollama (unverified inference, fast setup)
  #   "igemm"        : Quai InferenceGemm harness (emits Tensor Work Receipts)
  #
  # For production Quai inference (Claim 3 + Claim 6), use "igemm" so that
  # joules/token measurements are tied to verifiable Tensor Work Receipts.
  # See HARDWARE_SETUP.md Phase 2 for InferenceGemm setup instructions.
  #
  # Dominant Strategies benchmark (quai-igemm-qwen2.5-3b-w8a8-research):
  #   baseline tok/s  : 64.49
  #   receipt-mode    : 62.57
  #   TWP overhead    : 2.98%
  # Source: https://huggingface.co/dominant-strategies/quai-igemm-qwen2.5-3b-w8a8-research
  backend: "ollama"              # switch to "igemm" when harness is set up
  ollama_url: "http://127.0.0.1:11434"
  igemm_url: "http://127.0.0.1:8000"  # vLLM-compatible endpoint for InferenceGemm

  # Reference model. Aligned with Dominant Strategies' InferenceGemm reference
  # implementation. For Ollama backend use the GGUF equivalent; for igemm
  # backend use the HF checkpoint directly.
  model: "qwen2.5:3b"           # Ollama: qwen2.5:3b  |  igemm: dominant-strategies/quai-igemm-qwen2.5-3b-w8a8-research
  igemm_model: "dominant-strategies/quai-igemm-qwen2.5-3b-w8a8-research"

  probe_prompt: "Briefly explain what a hash function does."

  # TWP overhead threshold for Claim 3 (P3b).
  # Pre-registered: receipt-mode overhead must be <= this fraction of baseline
  # tok/s to be considered negligible. Dominant Strategies measured 2.98% on
  # the 3B model; 0.10 (10%) is a conservative pre-registered ceiling.
  twp_overhead_threshold: 0.10

  # --calibrate-rig: your Quai miner invocation; hashrate parsed from stdout.
  miner_command: []
  hashrate_regex: "([0-9]+(?:\\.[0-9]+)?)\\s*[Mm][Hh]/s"
  hashrate_unit_multiplier: 1000000

claim2:
  rolling_window_days: 30
  token_bundle: 1000000
  # Used ONLY until measurements.db has real joules/token rows from
  # benchmark.py --store; outputs are labeled when this fallback is active.
  joules_per_token_fallback: "0.5"

claim6:
  # Workshare-for-inference dual-revenue model (Claim 6)
  #
  # workshare_difficulty_factor: ratio of workshare threshold to full block difficulty.
  # Default 0.1 means workshares are 10x easier than blocks. Calibrate against
  # observed workshare inclusion rates once real on-chain data is available.
  workshare_difficulty_factor: 0.1
  #
  # block_reward_qi: Qi awarded per block to workshare submitters (total pool).
  # Calibrate from on-chain block reward data. network.block_reward_qi is the
  # full block reward; this is the fraction distributed to workshares.
  block_reward_qi: 1.0
  #
  # workshares_per_block_target: Quai's soft target for workshares per block.
  # Used to compute expected Qi per workshare via PRS (Proportional Reward Splitting).
  workshares_per_block_target: 3.0
  #
  # coverage_threshold_fraction: minimum workshare coverage fraction for P6 to pass.
  # Pre-registered candidate: 0.05 (5%). Freeze alongside other thresholds.
  coverage_threshold_fraction: 0.05
  #
  # tokens_per_sec_fallback: used when no benchmark measurement is available.
  # Replace with output of `python3 benchmark.py --minutes 5 --store`.
  tokens_per_sec_fallback: 50.0

claim5:
  # Minimum aligned observations required for P5a and P5b verdicts.
  # Candidate prior: same as claim 1 (90 days). Freeze alongside other thresholds.
  min_samples: 90
  # P5b: minimum absolute lagged correlation to declare a leading signal detected.
  min_leading_corr: 0.05
  # P5c: maximum allowed deviation between market-implied and on-chain rate (fraction).
  max_market_onchain_deviation: 0.20
  # P5c: maximum consecutive days of deviation before it counts as a failure.
  max_consecutive_deviation_days: 30
  # Exchange rate scale: on-chain exchangeRate is a big.Int with 1e18 denominator.
  # Divide raw hex value by this to get Qi-per-QUAI.
  exchange_rate_scale: 1.0e18

soap:
  # Project SOAP (Subsidized Open-market Acquisition Protocol) - launched Dec 2025.
  # SHA-256 (BCH/BTC) and Scrypt (LTC/DOGE) ASICs submit workshares to Quai blocks
  # and earn QUAI rewards. This is a separate protocol layer from the QiCompute
  # inference model — ASICs are not part of the inference pipeline.
  #
  # QiCompute's inference layer uses the TWP (Tensor Work Proof) native algorithm:
  # the GPU running InferenceGemm IS the miner. TWP receipts are submitted as
  # Quai workshares and earn Qi rewards directly.
  #
  # Algorithm energy normalisation factors (J/hash relative to KawPoW).
  # Only kawpow and twp are relevant to the inference model.
  algo_energy_factors:
    kawpow: 1.0                 # reference (RTX 3090, ~6.67e-9 J/hash)
    twp: 1.0                    # TWP inference workshares — calibrate with benchmark.py --calibrate-rig --algo twp
                                # energy_factor = joules_per_TWP_receipt / joules_per_KawPoW_hash
                                # Default 1.0 (same order of magnitude as KawPoW GPU); replace with measured value

  # TWP inference reference rig.
  # Populated by: python3 benchmark.py --calibrate-rig --algo twp
  # The TWP "hash" is one Tensor Work Receipt (one inference run).
  # hashrate_hps here means receipts/second.
  reference_twp:
    name: ""                    # e.g. "RTX 3090 + quai-igemm-qwen2.5-3b-w8a8-research"
    hashrate_hps: 0             # receipts/sec
    watts: 0                    # board draw in watts

  # TWP calibration uses the igemm backend directly — no external miner command needed.
  twp_miner_command: []         # leave empty; twp calibration uses the igemm backend directly
  twp_hashrate_regex: "([0-9]+(?:\\.[0-9]+)?)\\s*receipts?/s"
  twp_hashrate_unit_multiplier: 1                 # receipts/s -> receipts/s (no conversion needed)

claim7:
  # Claim 7: SOAP adoption rate as energy anchor leading indicator.
  # Tracks the fraction of Quai's effective difficulty contributed by SOAP
  # (SHA-256 / Scrypt ASIC) workshares over time, and tests whether it is
  # growing at a meaningful rate.
  #
  # Minimum days of post-SOAP-launch data required for a reliable trend.
  min_samples: 90
  # P7: minimum growth rate in SOAP fraction to declare adoption is growing.
  # Units: percentage points per quarter (90 days).
  # Candidate prior: 1 pp/quarter (conservative — any measurable growth counts).
  min_growth_pct_per_quarter: 1.0
  # P7: minimum latest SOAP fraction to declare adoption is non-negligible.
  # Candidate prior: 0.001 (0.1% of effective difficulty from ASIC workshares).
  min_latest_fraction: 0.001
  # Bitcoin reference hashrate used in Claim 6 BTC-scale scenarios.
  # Update periodically from https://www.blockchain.com/explorer/charts/hash-rate
  bitcoin_hashrate_ehs: 800.0

verdict:
  # PRE-REGISTRATION SWITCH. While false, every claim-1 output is stamped
  # "THRESHOLDS DRAFT - not citable". Flip to true only after the bracketed
  # candidates in PREDICTIONS.md are replaced with reviewed numbers
  # (ideally by someone who doubts the thesis) - and never after looking at
  # real regression output.
  thresholds_frozen: false
  # Below this many aligned daily observations, claim 1 reports
  # "insufficient_data" rather than a verdict either way.
  min_samples: 90
  # Pre-registered liquidity gate (PREDICTIONS.md / OBJECTIONS.md (d)):
  # below this median daily Qi volume the market price is treated as noise
  # and claim 1 reports "below_liquidity_threshold" instead of a verdict.
  # Candidate rationale: a plausible single $5k hedge should move <10% of a
  # day's volume. Flagged for review before result interpretation.
  min_median_daily_volume_usd: 50000
  # Pre-registered beta range and t-statistic threshold (PREDICTIONS.md P1).
  # The energy-cost beta must be in [beta_min, beta_max] AND t_beta > t_beta_min
  # for a supports_energy_thesis verdict. Candidate priors - freeze alongside
  # thresholds_frozen before looking at real regression output.
  beta_min: 0.5
  beta_max: 1.5
  t_beta_min: 2.0
