name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Claims and daemon tests
        run: python -m unittest -v
      - name: Sample pipeline runs end-to-end
        run: python reproduce.py --sample
      - name: Crossover daemon tool suite
        run: cd tools/crossover-daemon && python -m unittest
      - name: Legacy suite
        run: cd legacy && python -m unittest
